<div class="lessons-page">
  <!-- HEADER -->
  <div class="header">
    <h2>Lecciones creadas</h2>
    <p>Gestión de contenido educativo</p>
  </div>

  <!-- TABLE -->
  <div class="table-container" *ngIf="paginatedLessons.length; else empty">
    <table>
      <thead>
        <tr>
          <th>Título</th>
          <th>Nivel</th>
          <th>Autor</th>
          <th>Estado</th>
          <th>Fecha</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let lesson of paginatedLessons">
          <td>{{ lesson.title }}</td>
          <td>{{ lesson.level }}</td>
          <td>{{ lesson.author }}</td>

          <td>
            <span
              class="status"
              [class.published]="lesson.status === 'published'"
              [class.draft]="lesson.status === 'draft'"
              (click)="toggleStatus(lesson)"
            >
              {{ lesson.status }}
            </span>
          </td>

          <td>{{ lesson.createdAt | date: 'short' }}</td>

          <td class="actions">
            <button class="edit">Editar</button>
            <button class="delete" (click)="deleteLesson(lesson.id)">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- PAGINACIÓN -->
  <div class="pagination" *ngIf="totalPages > 1">
    <button (click)="prevPage()" [disabled]="currentPage === 1">← Anterior</button>

    <span> Página {{ currentPage }} de {{ totalPages }} </span>

    <button (click)="nextPage()" [disabled]="currentPage === totalPages">Siguiente →</button>
  </div>

  <!-- EMPTY -->
  <ng-template #empty>
    <p class="empty">No hay lecciones creadas</p>
  </ng-template>
</div>
