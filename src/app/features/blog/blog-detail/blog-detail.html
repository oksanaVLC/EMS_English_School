@if (post) {
  <div class="blog-detail">
    <div class="container">
      <h1 class="title">{{ post.title }}</h1>

      <div class="meta">
        <span>{{ post.created_at | date: 'mediumDate' }}</span>
      </div>

      @if (post.cover) {
        <img class="cover" [src]="post.cover" alt="cover" />
      }

      <div class="content">
        {{ post.content }}
      </div>
    </div>
  </div>
}
