<div class="grid">
  @for (post of posts; track post.id) {
    <article class="card">
      <div class="image-wrapper" (click)="goToPost(post.slug)">
        <img [src]="post.cover" alt="cover" />
      </div>

      <div class="content">
        <h2 class="title">
          {{ post.title }}
        </h2>

        <div class="meta">
          <span class="author">{{ post.user?.name }}</span>
          <span class="dot">•</span>
          <span class="date">
            {{ post.created_at | date: 'dd MMM yyyy' }}
          </span>
        </div>

        <p class="excerpt">
          {{ getExcerpt(post) | slice: 0 : 140 }}
          {{ getExcerpt(post).length > 140 ? '...' : '' }}
        </p>

        <span class="read-more" (click)="goToPost(post.slug)"> Leer más → </span>
      </div>
    </article>
  }
</div>
