<div class="pagination">
  <button (click)="prev()" [disabled]="currentPage === 1">‹</button>

  <button
    *ngFor="let page of pages"
    (click)="goTo(page)"
    [class.active]="isActive(page)"
    [disabled]="page === '...'"
  >
    {{ page }}
  </button>

  <button (click)="next()" [disabled]="currentPage === lastPage">›</button>
</div>
